<body class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary selection:text-on-primary node-pattern">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#111417] dark:bg-slate-900 shadow-none">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a4a5ff] dark:text-indigo-300" data-icon="hub">hub</span>
<h1 class="font-headline font-bold tracking-tight text-lg text-xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Concord</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-slate-400 dark:text-slate-500 hover:bg-slate-800/50 transition-colors duration-200 p-2 rounded-full" data-icon="sensors">sensors</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 mx-auto w-full md:max-w-2xl">
<!-- Page Title & Intro -->
<section class="mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight mb-2">Host a New Session</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">Initialize a decentralized neural link. Choose your protocol and node persistence.</p>
</section>
<!-- Session Type Selection -->
<section class="space-y-4 mb-10">
<label class="font-label text-xs uppercase tracking-widest font-semibold text-primary mb-2 block">Choose Session Type</label>
<button class="w-full flex items-center justify-between p-5 rounded-xl bg-surface-container-low border border-transparent hover:border-primary/20 transition-all group">
<div class="flex items-center gap-4">
<div class="p-3 bg-surface-container-high rounded-lg text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined" data-icon="chat">chat</span>
</div>
<div class="text-left">
<p class="font-semibold text-on-surface">Text Only</p>
<p class="text-xs text-on-surface-variant">Low latency, minimal bandwidth</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-xl bg-surface-container-high border border-primary/40 transition-all group">
<div class="flex items-center gap-4">
<div class="p-3 bg-primary rounded-lg text-on-primary shadow-[0_0_15px_rgba(164,165,255,0.3)]">
<span class="material-symbols-outlined" data-icon="keyboard_voice">keyboard_voice</span>
</div>
<div class="text-left">
<p class="font-semibold text-on-surface">Voice &amp; Text</p>
<p class="text-xs text-on-surface-variant">Encrypted audio stream active</p>
</div>
</div>
<span class="material-symbols-outlined text-primary" data-icon="radio_button_checked">radio_button_checked</span>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-xl bg-surface-container-low border border-transparent hover:border-primary/20 transition-all group">
<div class="flex items-center gap-4">
<div class="p-3 bg-surface-container-high rounded-lg text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined" data-icon="video_call">video_call</span>
</div>
<div class="text-left">
<p class="font-semibold text-on-surface">Video, Voice &amp; Text</p>
<p class="text-xs text-on-surface-variant">High-fidelity p2p relay</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</section>
<!-- Node Configuration -->
<section class="mb-10">
<label class="font-label text-xs uppercase tracking-widest font-semibold text-primary mb-4 block">Persistence Strategy</label>
<div class="grid grid-cols-2 gap-3 p-1.5 bg-surface-container-low rounded-xl">
<button class="py-3 px-4 rounded-lg bg-surface-container-highest text-on-surface font-semibold text-sm transition-all shadow-sm">
                    Temporary Node
                </button>
<button class="py-3 px-4 rounded-lg text-on-surface-variant font-medium text-sm hover:text-on-surface transition-all">
                    Persistent Node
                </button>
</div>
<p class="mt-3 text-xs text-on-surface-variant px-2 italic">Temporary nodes auto-delete all traces once the last member disconnects.</p>
</section>
<!-- Dynamic Invitation -->
<section class="mb-12">
<div class="p-6 rounded-2xl bg-surface-container-high relative overflow-hidden">
<div class="relative z-10">
<label class="font-label text-[10px] uppercase tracking-widest font-bold text-secondary mb-3 block">Shareable Node ID</label>
<div class="flex items-center justify-between bg-surface-container-lowest/50 rounded-lg p-3 border border-outline-variant/10">
<code class="text-primary font-mono text-sm tracking-wider">knode-tx-992-delta</code>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" data-icon="content_copy">content_copy</button>

<div class="w-8 h-8 rounded-full border-2 border-surface-container-high bg-secondary-container flex items-center justify-center text-[10px] text-secondary font-bold">+12</div>
</div>
</div>
<!-- Background Decoration -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl -mr-16 -mt-16"></div>
</div>

<!-- CTA Action -->
<button class="w-full py-5 rounded-xl bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg shadow-[0_12px_24px_-8px_rgba(164,165,255,0.4)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
<span>Go Live</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
