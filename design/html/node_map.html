<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .node-pulse {
            box-shadow: 0 0 0 0 rgba(164, 165, 255, 0.7);
            animation: pulse-purple 2s infinite;
        }
        @keyframes pulse-purple {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(164, 165, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(164, 165, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(164, 165, 255, 0); }
        }
        .glass-panel {
            background: rgba(29, 32, 36, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .map-gradient {
            background: radial-gradient(circle at center, transparent 0%, #0c0e11 90%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#0c0e11] dark:bg-[#0c0e11] flex items-center justify-between px-6 py-4 w-full z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a4a5ff] text-2xl" data-icon="hub">hub</span>
<h1 class="font-['Space_Grotesk'] tracking-tight text-on-surface text-xl font-bold tracking-widest text-[#a4a5ff] uppercase">CONCORD</h1>
</div>
<div class="hidden md:flex items-center gap-8">
<nav class="flex items-center gap-6">
<a class="text-[#aaabaf] font-['Manrope'] text-sm font-semibold uppercase tracking-wider hover:bg-[#1d2024] transition-colors px-3 py-1 rounded-lg" href="#">Dashboard</a>
<a class="text-[#f9f9fd] font-['Manrope'] text-sm font-semibold uppercase tracking-wider hover:bg-[#1d2024] transition-colors px-3 py-1 rounded-lg" href="#">Map</a>
<a class="text-[#aaabaf] font-['Manrope'] text-sm font-semibold uppercase tracking-wider hover:bg-[#1d2024] transition-colors px-3 py-1 rounded-lg" href="#">Settings</a>
</nav>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border border-outline-variant/15">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative flex-grow w-full overflow-hidden">
<!-- Map Background -->
<div class="absolute inset-0 z-0 bg-surface">
<!-- Simulated Map Image -->
<img class="w-full h-full object-cover opacity-20 grayscale brightness-50" data-alt="stylized dark topological map of urban digital network with glowing cyan and indigo nodes connected by thin geometric data lines" data-location="Global Digital Network" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAi7y2G5zp10iLAFfYa7sXfyj3XPO7tjHTT7MfsAXQbiV-89b9PnQlvzDGuFOheivT0YSuIQLNr1LcU10GCho265Ym_yxHhpE4v4KFlKOp93gPHaD9IXN55rvC9yWTcwWSy_N63bybqIt21vLfI-qIKCuL5nISEzj0DskPQNnUXXIIfKlUDZQX2v4CAngKiVKVoT058vzapwJTcAD1mmNxdLJhyMqQDpscmPMD0DDAbZEA3qNSKFhWT1QVbx_PNi0yJIMvaxziNeHo"/>
<div class="absolute inset-0 map-gradient"></div>
<!-- Floating Node Clusters (Manual Placement for Aesthetic Asymmetry) -->
<div class="absolute top-1/4 left-1/3 w-2 h-2 rounded-full bg-secondary shadow-[0_0_12px_#afefdd] opacity-80"></div>
<div class="absolute top-1/3 left-1/4 w-1.5 h-1.5 rounded-full bg-secondary shadow-[0_0_8px_#afefdd] opacity-60"></div>
<div class="absolute top-1/2 left-1/2 w-3 h-3 rounded-full bg-primary node-pulse z-10"></div> <!-- Your Node -->
<div class="absolute top-2/3 right-1/4 w-2.5 h-2.5 rounded-full bg-primary-fixed shadow-[0_0_10px_#9496ff] opacity-90"></div>
<div class="absolute bottom-1/4 left-1/2 w-2 h-2 rounded-full bg-primary-fixed shadow-[0_0_10px_#9496ff] opacity-70"></div>
<div class="absolute top-1/2 right-1/3 w-2 h-2 rounded-full bg-secondary shadow-[0_0_12px_#afefdd] opacity-80"></div>
<div class="absolute bottom-1/3 right-1/2 w-1.5 h-1.5 rounded-full bg-secondary shadow-[0_0_8px_#afefdd] opacity-60"></div>
</div>
<!-- Floating UI Overlays -->
<div class="relative z-10 w-full h-full pointer-events-none p-6 md:p-10 flex flex-col justify-between">
<!-- Top Controls: Search & Legend -->
<div class="flex flex-col md:flex-row justify-between items-start gap-6">
<!-- Search Bar -->
<div class="w-full md:w-96 pointer-events-auto">
<div class="glass-panel rounded-xl p-1 flex items-center shadow-2xl border border-outline-variant/15">
<div class="pl-4 pr-2 text-on-surface-variant">
<span class="material-symbols-outlined text-lg" data-icon="search">search</span>
</div>
<input class="bg-transparent border-none focus:ring-0 text-sm w-full font-body py-3 text-on-surface placeholder:text-on-surface-variant" placeholder="Find specific node address..." type="text"/>
<button class="bg-primary hover:bg-primary-dim text-on-primary-fixed px-4 py-2 rounded-lg font-bold text-xs uppercase tracking-widest transition-all active:scale-95 mx-1">
                            Locate
                        </button>
</div>
</div>
<!-- Legend -->
<div class="pointer-events-auto glass-panel rounded-xl p-5 border border-outline-variant/10 shadow-xl backdrop-blur-xl">
<h3 class="font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-4 font-bold">Network Legend</h3>
<div class="flex flex-col gap-4">
<div class="flex items-center gap-3">
<span class="w-2.5 h-2.5 rounded-full bg-secondary shadow-[0_0_8px_rgba(175,239,221,0.5)]"></span>
<span class="text-xs font-semibold tracking-wide text-on-surface-variant">Active Nodes</span>
</div>
<div class="flex items-center gap-3">
<span class="w-2.5 h-2.5 rounded-full bg-primary-fixed shadow-[0_0_8px_rgba(148,150,255,0.5)]"></span>
<span class="text-xs font-semibold tracking-wide text-on-surface-variant">Public Servers</span>
</div>
<div class="flex items-center gap-3">
<span class="w-2.5 h-2.5 rounded-full bg-primary node-pulse"></span>
<span class="text-xs font-semibold tracking-wide text-on-surface">Your Node</span>
</div>
</div>
</div>
</div>
<!-- Bottom Stats: Metrics Overlay -->
<div class="flex flex-col md:flex-row gap-4 md:items-end pointer-events-auto">

<div class="glass-panel p-6 rounded-2xl min-w-[240px] border border-outline-variant/5 shadow-2xl relative overflow-hidden group hover:bg-[#1d2024]/80 transition-all duration-300">
<div class="absolute -right-4 -bottom-4 opacity-5 group-hover:opacity-10 transition-opacity">
<span class="material-symbols-outlined text-8xl" data-icon="cell_tower" style="font-variation-settings: 'FILL' 1;">cell_tower</span>
</div>
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="wifi_tethering">wifi_tethering</span>
<span class="font-headline text-[10px] uppercase tracking-widest text-on-surface-variant">Coverage</span>
</div>
<div class="text-3xl font-headline font-bold text-on-surface tracking-tighter">1,429</div>
<div class="text-[11px] font-body uppercase tracking-widest text-on-surface-variant mt-1">Nearby Nodes</div>
</div>
<!-- Public Servers Card -->
<div class="glass-panel p-6 rounded-2xl min-w-[240px] border border-outline-variant/5 shadow-2xl relative overflow-hidden group hover:bg-[#1d2024]/80 transition-all duration-300">
<div class="absolute -right-4 -bottom-4 opacity-5 group-hover:opacity-10 transition-opacity">
<span class="material-symbols-outlined text-8xl" data-icon="dns" style="font-variation-settings: 'FILL' 1;">dns</span>
</div>
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary text-sm" data-icon="hub">hub</span>
<span class="font-headline text-[10px] uppercase tracking-widest text-on-surface-variant">Backbone</span>
</div>
<div class="text-3xl font-headline font-bold text-on-surface tracking-tighter">84</div>
<div class="text-[11px] font-body uppercase tracking-widest text-on-surface-variant mt-1">Public Servers</div>
</div>
<!-- Network Status Badge -->
<div class="glass-panel px-4 py-3 rounded-xl ml-auto border border-secondary/20 flex items-center gap-3">
<div class="flex gap-1">
<span class="w-1 h-3 bg-secondary rounded-full"></span>
<span class="w-1 h-3 bg-secondary rounded-full"></span>
<span class="w-1 h-3 bg-secondary rounded-full"></span>
<span class="w-1 h-3 bg-secondary/30 rounded-full"></span>
</div>
<span class="text-xs font-bold uppercase tracking-widest text-secondary">Local Sync: Optimal</span>
</div>
</div>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0c0e11]/60 backdrop-blur-xl dark:bg-[#0c0e11]/60 border-t border-[#46484b]/15 md:hidden">

<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-[#afefdd] bg-[#1d2024] rounded-xl px-4 py-2 hover:text-[#f9f9fd] transition-all Active: scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-[#aaabaf] opacity-70 px-4 py-2 hover:text-[#f9f9fd] transition-all Active: scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
